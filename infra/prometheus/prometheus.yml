global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'sega-backend'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:4000']

  - job_name: 'sega-redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
