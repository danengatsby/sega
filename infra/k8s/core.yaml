apiVersion: v1
kind: Namespace
metadata:
  name: sega
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sega-app-config
  namespace: sega
data:
  NODE_ENV: production
  PORT: '4000'
  DATABASE_HOST: postgres
  DATABASE_PORT: '5432'
  DATABASE_NAME: sega_accounting
  DATABASE_USER: sega
  REDIS_URL: redis://redis:6379
  EXPORT_JOB_QUEUE_MODE: bull
  CORS_ORIGIN: https://sega-contab.online
  ANAF_EFACTURA_MODE: off
  MINIO_ENDPOINT: http://minio:9000
  MINIO_BUCKET_EFACTURA: efactura
---
apiVersion: v1
kind: Secret
metadata:
  name: sega-app-secrets
  namespace: sega
type: Opaque
stringData:
  DATABASE_PASSWORD: sega
  DATABASE_URL: postgresql://sega:sega@postgres:5432/sega_accounting?schema=public
  JWT_ACCESS_PRIVATE_KEY: replace-with-rsa-private-key
  JWT_ACCESS_PUBLIC_KEY: replace-with-rsa-public-key
  JWT_REFRESH_PRIVATE_KEY: replace-with-rsa-refresh-private-key
  JWT_REFRESH_PUBLIC_KEY: replace-with-rsa-refresh-public-key
  MINIO_ACCESS_KEY: segaadmin
  MINIO_SECRET_KEY: segasecret123
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: sega
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/danengatsby/sega-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sega-app-secrets
                  key: DATABASE_URL
          envFrom:
            - configMapRef:
                name: sega-app-config
            - secretRef:
                name: sega-app-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: sega
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 4000
      targetPort: 4000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: sega
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/danengatsby/sega-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: sega
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: sega
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: sega_accounting
            - name: POSTGRES_USER
              value: sega
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sega-app-secrets
                  key: DATABASE_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ['ReadWriteOnce']
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: sega
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: sega
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: sega
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: sega
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2025-02-07T23-21-09Z
          args: ['server', '/data', '--console-address', ':9001']
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: sega-app-secrets
                  key: MINIO_ACCESS_KEY
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sega-app-secrets
                  key: MINIO_SECRET_KEY
          ports:
            - containerPort: 9000
            - containerPort: 9001
          volumeMounts:
            - name: minio-data
              mountPath: /data
      volumes:
        - name: minio-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: sega
spec:
  selector:
    app: minio
  ports:
    - name: s3
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sega-ingress
  namespace: sega
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 20m
spec:
  ingressClassName: nginx
  rules:
    - host: sega-contab.online
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 4000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
