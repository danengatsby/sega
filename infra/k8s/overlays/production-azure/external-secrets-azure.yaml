apiVersion: v1
kind: ServiceAccount
metadata:
  name: sega-external-secrets
  namespace: sega
  annotations:
    azure.workload.identity/client-id: 00000000-0000-0000-0000-000000000000
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: sega-azure-keyvault
  namespace: sega
spec:
  provider:
    azurekv:
      authType: WorkloadIdentity
      vaultUrl: https://sega-prod-kv.vault.azure.net
      serviceAccountRef:
        name: sega-external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: sega-app-secrets
  namespace: sega
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: sega-azure-keyvault
  target:
    name: sega-app-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_PASSWORD
      remoteRef:
        key: DATABASE-PASSWORD
    - secretKey: DATABASE_URL
      remoteRef:
        key: DATABASE-URL
    - secretKey: JWT_ACCESS_PRIVATE_KEY
      remoteRef:
        key: JWT-ACCESS-PRIVATE-KEY
    - secretKey: JWT_ACCESS_PUBLIC_KEY
      remoteRef:
        key: JWT-ACCESS-PUBLIC-KEY
    - secretKey: JWT_REFRESH_PRIVATE_KEY
      remoteRef:
        key: JWT-REFRESH-PRIVATE-KEY
    - secretKey: JWT_REFRESH_PUBLIC_KEY
      remoteRef:
        key: JWT-REFRESH-PUBLIC-KEY
    - secretKey: MINIO_ACCESS_KEY
      remoteRef:
        key: MINIO-ACCESS-KEY
    - secretKey: MINIO_SECRET_KEY
      remoteRef:
        key: MINIO-SECRET-KEY
